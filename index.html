<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Battles Meta Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-purple: #6366f1;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-slot1: #22c55e;
            --border-slot2: #0ea5e9;
            --border-slot3: #f59e0b;
            --border-slot4: #a855f7;
            --border-slot5: #64748b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .controls {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #334155;
            cursor: pointer;
            user-select: none;
        }

        .toggle-container input { margin-right: 10px; cursor: pointer; }

        .loadout-container {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .slot {
            background: var(--card-bg);
            width: 155px;
            height: 80px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid transparent;
            font-size: 1.1rem;
            text-align: center;
        }

        .slot-1 { border-color: var(--border-slot1); }
        .slot-2 { border-color: var(--border-slot2); }
        .slot-3 { border-color: var(--border-slot3); }
        .slot-4 { border-color: var(--border-slot4); }
        .slot-5 { border-color: var(--border-slot5); }

        .gen-btn {
            background-color: var(--primary-purple);
            color: white;
            border: none;
            padding: 16px 50px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            margin-bottom: 45px;
        }

        .gen-btn:hover { background-color: #4f46e5; transform: translateY(-2px); }

        .ban-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 950px;
            border: 1px solid #334155;
        }

        .tower-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
            gap: 10px;
        }

        .tower-item {
            background: #334155;
            border: 1px solid transparent;
            padding: 12px;
            border-radius: 8px;
            color: var(--text-main);
            cursor: pointer;
            font-size: 0.9rem;
            text-align: center;
        }

        .tower-item.banned {
            background: #0f172a;
            color: #64748b;
            text-decoration: line-through;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>Tower Battles <span>Loadout</span></h1>

    <div class="controls">
        <label class="toggle-container">
            <input type="checkbox" id="forceMode"> Force CC & Single DPS
        </label>
    </div>

    <div class="loadout-container">
        <div id="s1" class="slot slot-1">Farm</div>
        <div id="s2" class="slot slot-2">DJ</div>
        <div id="s3" class="slot slot-3">Soldier</div>
        <div id="s4" class="slot slot-4">Mortar</div>
        <div id="s5" class="slot slot-5">Railgunner</div>
    </div>

    <button class="gen-btn" onclick="generate()">Generate Loadout</button>

    <div class="ban-section">
        <h2 style="margin-top:0; font-size: 1.2rem; color: var(--text-dim);">Ban List</h2>
        <div class="tower-grid" id="towerGrid"></div>
    </div>

    <script>
        const allTowers = [
            "DJ", "Commander", "Aviator", "Phaser", "Marksman", "Anarchist", "Tweeter", 
            "Plasma Trooper", "Mercenary", "Mortar", "Barracks", "Patrol", "Commando", 
            "Cryo-Gunner", "Railgunner", "Enforcer", "Shotgunner", "Soldier", "Fragger", 
            "Flamethrower", "Golden Scout", "Golden Commando", "Hallowboomer", "Tuber", 
            "Zed", "Graveyard", "Farm"
        ];

        const egList = ["Fragger", "Shotgunner", "Soldier", "Tuber", "Mortar", "Enforcer", "Aviator", "Mercenary", "Plasma Trooper", "Hallowboomer", "Tweeter", "Golden Scout"];
        const fallbackSupport = ["Cryo-Gunner", "Flamethrower", "Hallowboomer", "Anarchist"];
        
        const singleDpsList = ["Marksman", "Tweeter", "Mercenary", "Commando", "Enforcer", "Shotgunner", "Soldier", "Golden Scout", "Patrol", "Barracks"];
        const ccList = ["Fragger", "Shotgunner", "Tuber", "Enforcer", "Mortar", "Aviator", "Plasma Trooper", "Hallowboomer", "Patrol"];

        let banned = new Set();

        const grid = document.getElementById('towerGrid');
        allTowers.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'tower-item';
            btn.textContent = t;
            btn.onclick = () => {
                if (!banned.has(t)) {
                    if ((t === "Farm" && banned.has("Tweeter")) || (t === "Tweeter" && banned.has("Farm"))) return;
                    banned.add(t);
                    btn.classList.add('banned');
                } else {
                    banned.delete(t);
                    btn.classList.remove('banned');
                }
            };
            grid.appendChild(btn);
        });

        function getRandom(pool, used) {
            const available = pool.filter(t => !banned.has(t) && !used.has(t));
            return available.length > 0 ? available[Math.floor(Math.random() * available.length)] : "None";
        }

        function generate() {
            let used = new Set();
            const isForceMode = document.getElementById('forceMode').checked;
            
            // Slot 1: Econ
            const s1Val = banned.has("Farm") ? "Tweeter" : "Farm";
            document.getElementById('s1').textContent = s1Val;
            used.add(s1Val);

            // Slot 2: Support
            let s2Pool = ["DJ", "Commander"].filter(t => !banned.has(t));
            if (s2Pool.length === 0) s2Pool = fallbackSupport;
            const s2Val = getRandom(s2Pool, used);
            document.getElementById('s2').textContent = s2Val;
            used.add(s2Val);

            // Slot 3: Early Game
            const s3Val = getRandom(egList, used);
            document.getElementById('s3').textContent = s3Val;
            used.add(s3Val);

            // Slot 4: CC Logic
            let s4Val;
            if (isForceMode && !ccList.includes(s3Val)) {
                s4Val = getRandom(ccList, used);
            } else {
                s4Val = getRandom(allTowers, used);
            }
            document.getElementById('s4').textContent = s4Val;
            used.add(s4Val);

            // Slot 5: Single DPS Logic
            let s5Val;
            if (isForceMode && !singleDpsList.includes(s3Val)) {
                s5Val = getRandom(singleDpsList, used);
            } else {
                s5Val = getRandom(allTowers, used);
            }
            document.getElementById('s5').textContent = s5Val;
        }
    </script>
</body>
</html>
